<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignCast | Login</title>
    <style>
        :root {
            --page: #edf6f4;
            --surface: #fbfefd;
            --panel: #ffffff;
            --ink: #102023;
            --muted: #5d6d70;
            --line: #d7e5e2;
            --teal: #0f766e;
            --teal-deep: #064e47;
            --cyan: #16b8b3;
            --amber: #f2a51a;
            --danger: #b42318;
            --shadow: 0 24px 70px rgba(15, 47, 51, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                linear-gradient(rgba(15, 118, 110, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 118, 110, 0.07) 1px, transparent 1px),
                var(--page);
            background-size: 34px 34px;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        button,
        input {
            font: inherit;
        }

        a {
            color: var(--teal);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .auth-shell {
            width: min(1080px, 100%);
            min-height: 640px;
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
            overflow: hidden;
            background: var(--surface);
            border: 1px solid rgba(15, 118, 110, 0.16);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .brand-panel {
            position: relative;
            isolation: isolate;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 32px;
            padding: 46px;
            color: #f7fffd;
            background:
                linear-gradient(135deg, rgba(6, 78, 71, 0.98), rgba(15, 118, 110, 0.95) 58%, rgba(18, 92, 86, 0.98));
        }

        .brand-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            opacity: 0.24;
            background:
                linear-gradient(rgba(255, 255, 255, 0.24) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
            background-size: 42px 42px;
        }

        .brand-top {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mark {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            color: var(--teal-deep);
            background: #ecfffb;
            border: 1px solid rgba(255, 255, 255, 0.36);
            border-radius: 8px;
            box-shadow: 0 12px 28px rgba(2, 34, 31, 0.2);
        }

        .mark svg {
            width: 30px;
            height: 30px;
        }

        .brand-name {
            margin: 0;
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 0;
        }

        .brand-type {
            margin: 3px 0 0;
            color: rgba(247, 255, 253, 0.78);
            font-size: 13px;
        }

        .brand-copy {
            max-width: 540px;
        }

        .brand-copy h1 {
            margin: 0;
            max-width: 12ch;
            font-size: 48px;
            line-height: 1.04;
            letter-spacing: 0;
        }

        .brand-copy p {
            margin: 18px 0 0;
            max-width: 52ch;
            color: rgba(247, 255, 253, 0.82);
            font-size: 16px;
            line-height: 1.65;
        }

        .visual-frame {
            min-height: 245px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            background: rgba(2, 35, 32, 0.24);
            backdrop-filter: blur(10px);
        }

        .gesture-map {
            width: 100%;
            height: 100%;
            min-height: 205px;
            display: block;
        }

        .gesture-map .trace {
            fill: none;
            stroke: rgba(236, 255, 251, 0.7);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .gesture-map .measure {
            stroke: var(--amber);
            stroke-width: 2;
            stroke-dasharray: 7 8;
        }

        .gesture-map .joint {
            fill: #ecfffb;
            stroke: var(--cyan);
            stroke-width: 3;
        }

        .gesture-map .active {
            fill: var(--amber);
            stroke: #fff7db;
        }

        .login-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px;
            background: var(--panel);
        }

        .mobile-brand {
            display: none;
            margin-bottom: 28px;
        }

        .mobile-brand .brand-name {
            color: var(--ink);
        }

        .mobile-brand .brand-type {
            color: var(--muted);
        }

        .login-heading {
            margin-bottom: 30px;
        }

        .login-heading h2 {
            margin: 0;
            font-size: 31px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .login-heading p {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            color: #203438;
            font-size: 14px;
            font-weight: 700;
        }

        .field input[type="email"],
        .field input[type="password"] {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfefd;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        .field input::placeholder {
            color: #8ba0a2;
        }

        .field input:focus {
            border-color: var(--teal);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(22, 184, 179, 0.16);
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin: 4px 0 24px;
            color: var(--muted);
            font-size: 14px;
        }

        .remember {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: max-content;
            cursor: pointer;
        }

        .remember input {
            width: 16px;
            height: 16px;
            accent-color: var(--teal);
        }

        .login-button {
            width: 100%;
            min-height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ffffff;
            border: 0;
            border-radius: 8px;
            background: var(--teal);
            font-weight: 800;
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        .login-button:hover {
            background: var(--teal-deep);
            box-shadow: 0 14px 30px rgba(6, 78, 71, 0.22);
            transform: translateY(-1px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button svg {
            width: 18px;
            height: 18px;
        }

        .login-message {
            min-height: 22px;
            margin: 14px 0 0;
            color: var(--teal-deep);
            font-size: 14px;
        }

        .signup-note {
            margin: 26px 0 0;
            padding-top: 22px;
            color: var(--muted);
            border-top: 1px solid var(--line);
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 880px) {
            body {
                padding: 16px;
            }

            .auth-shell {
                min-height: auto;
                grid-template-columns: 1fr;
                max-width: 480px;
            }

            .brand-panel {
                display: none;
            }

            .login-panel {
                padding: 34px 26px;
            }

            .mobile-brand {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .login-heading h2 {
                font-size: 27px;
            }
        }

        @media (max-width: 420px) {
            .form-options {
                align-items: flex-start;
                flex-direction: column;
            }

            .login-panel {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <main class="auth-shell" aria-label="SignCast login">
        <section class="brand-panel" aria-label="SignCast overview">
            <div class="brand-top">
                <div class="mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 17.5V9.25C9 8.15 9.9 7.25 11 7.25C12.1 7.25 13 8.15 13 9.25V15.25" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M13 15.25V6.75C13 5.65 13.9 4.75 15 4.75C16.1 4.75 17 5.65 17 6.75V15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M17 15V8.25C17 7.15 17.9 6.25 19 6.25C20.1 6.25 21 7.15 21 8.25V16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M21 16V11.5C21 10.4 21.9 9.5 23 9.5C24.1 9.5 25 10.4 25 11.5V19.25C25 24 21.15 27.25 16.6 27.25H15.1C11.25 27.25 8 24 8 20.15V17.5H9Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8 17.5H5.8C4.65 17.5 3.75 18.4 3.75 19.55C3.75 21.65 5.45 23.25 7.5 23.25H9.4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <p class="brand-name">SignCast</p>
                    <p class="brand-type">Vector gesture mapper</p>
                </div>
            </div>

            <div class="brand-copy">
                <h1>Sign in to SignCast</h1>
                <p>Open the workspace for browser-based sign language mapping.</p>
            </div>

            <div class="visual-frame" aria-hidden="true">
                <svg class="gesture-map" viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg">
                    <path class="measure" d="M76 202 L172 151 L259 110 L351 82 L438 53"/>
                    <path class="measure" d="M175 222 L226 166 L274 117 L320 73"/>
                    <path class="trace" d="M126 206 C111 175 114 145 140 125 C161 108 184 117 196 137 C210 106 238 97 259 116 C273 83 303 72 322 94 C337 64 369 57 387 82 C407 110 398 151 375 181 C337 230 263 248 193 229 C166 222 145 215 126 206Z"/>
                    <path class="trace" d="M139 126 L92 81 M196 137 L180 54 M259 116 L261 36 M322 94 L346 37 M387 82 L436 45"/>
                    <circle class="joint" cx="126" cy="206" r="9"/>
                    <circle class="joint active" cx="139" cy="126" r="8"/>
                    <circle class="joint" cx="92" cy="81" r="8"/>
                    <circle class="joint active" cx="196" cy="137" r="8"/>
                    <circle class="joint" cx="180" cy="54" r="8"/>
                    <circle class="joint active" cx="259" cy="116" r="8"/>
                    <circle class="joint" cx="261" cy="36" r="8"/>
                    <circle class="joint active" cx="322" cy="94" r="8"/>
                    <circle class="joint" cx="346" cy="37" r="8"/>
                    <circle class="joint active" cx="387" cy="82" r="8"/>
                    <circle class="joint" cx="436" cy="45" r="8"/>
                    <circle class="joint" cx="193" cy="229" r="8"/>
                    <circle class="joint" cx="375" cy="181" r="8"/>
                </svg>
            </div>
        </section>

        <section class="login-panel">
            <div class="mobile-brand">
                <div class="mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 17.5V9.25C9 8.15 9.9 7.25 11 7.25C12.1 7.25 13 8.15 13 9.25V15.25" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M13 15.25V6.75C13 5.65 13.9 4.75 15 4.75C16.1 4.75 17 5.65 17 6.75V15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M17 15V8.25C17 7.15 17.9 6.25 19 6.25C20.1 6.25 21 7.15 21 8.25V16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        <path d="M21 16V11.5C21 10.4 21.9 9.5 23 9.5C24.1 9.5 25 10.4 25 11.5V19.25C25 24 21.15 27.25 16.6 27.25H15.1C11.25 27.25 8 24 8 20.15V17.5H9Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8 17.5H5.8C4.65 17.5 3.75 18.4 3.75 19.55C3.75 21.65 5.45 23.25 7.5 23.25H9.4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <p class="brand-name">SignCast</p>
                    <p class="brand-type">Vector gesture mapper</p>
                </div>
            </div>

            <div class="login-heading">
                <h2>Welcome back</h2>
                <p>Use your account to open the SignCast web console.</p>
            </div>

            <form id="loginForm">
                <div class="field">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" autocomplete="email" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>

                <div class="form-options">
                    <label class="remember" for="remember">
                        <input type="checkbox" id="remember" name="remember">
                        Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button class="login-button" type="submit">
                    Sign in
                    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M4 10H15M11 6L15 10L11 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>

                <p class="login-message" id="loginMessage" aria-live="polite"></p>
            </form>

            <p class="signup-note">New to SignCast? <a href="#">Create an account</a></p>
        </section>
    </main>

    <script>
        const form = document.getElementById("loginForm");
        const message = document.getElementById("loginMessage");

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            message.textContent = "Login screen ready. Connect this form to your authentication flow next.";
        });
    </script>
</body>
</html>
